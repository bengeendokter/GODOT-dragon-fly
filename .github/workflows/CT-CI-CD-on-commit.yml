name: "CT/CI/CD on commit."
on:
  push:
    branches:
      - '**'

env:
  GODOT_VERSION: 3.4.2
  GAME_NAME: dragon-fly

jobs:
  download-assets:
#     if: ${{ false }}  # disable for now
    name: Download Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ✔
        uses: actions/checkout@v2
      
      - run: ls ${{ github.workspace }}
        
      - name: Download assets ⬇
        run: |
         curl 'https://hogent-my.sharepoint.com/personal/ben_arts_student_hogent_be/_layouts/15/download.aspx?SourceUrl=%2Fpersonal%2Fben%5Farts%5Fstudent%5Fhogent%5Fbe%2FDocuments%2FPersoonlijk%2FDocuments%2FGodot%2FDragon%2C%20fly%21%2Fassets%2Ezip' \
         -H 'authority: hogent-my.sharepoint.com' \
         -H 'pragma: no-cache' \
         -H 'cache-control: no-cache' \
         -H 'sec-ch-ua: " Not;A Brand";v="99", "Google Chrome";v="97", "Chromium";v="97"' \
         -H 'sec-ch-ua-mobile: ?0' \
         -H 'sec-ch-ua-platform: "Windows"' \
         -H 'upgrade-insecure-requests: 1' \
         -H 'user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/97.0.4692.99 Safari/537.36' \
         -H 'accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9' \
         -H 'service-worker-navigation-preload: true' \
         -H 'sec-fetch-site: same-origin' \
         -H 'sec-fetch-mode: navigate' \
         -H 'sec-fetch-dest: iframe' \
         -H 'referer: https://hogent-my.sharepoint.com/personal/ben_arts_student_hogent_be/_layouts/15/onedrive.aspx?id=%2Fpersonal%2Fben%5Farts%5Fstudent%5Fhogent%5Fbe%2FDocuments%2FPersoonlijk%2FDocuments%2FGodot%2FDragon%2C%20fly%21%2Fassets%2Ezip&parent=%2Fpersonal%2Fben%5Farts%5Fstudent%5Fhogent%5Fbe%2FDocuments%2FPersoonlijk%2FDocuments%2FGodot%2FDragon%2C%20fly%21' \
         -H 'accept-language: nl-BE,nl-NL;q=0.9,nl;q=0.8,en-GB;q=0.7,en-US;q=0.6,en-BE;q=0.5,en;q=0.4' \
         -H 'cookie: MicrosoftApplicationsTelemetryDeviceId=1bb89d9c-e22e-4b71-9642-2425fa71d08c; MicrosoftApplicationsTelemetryFirstLaunchTime=2022-02-07T15:13:18.548Z; MSFPC=GUID=f6d7af34c3264ae0b12ac0ef3a48dfc2&HASH=f6d7&LV=202104&V=4&LU=1619082878052; ExcelWacDataCenter=GEU2; WordWacDataCenter=GEU8; PowerPointWacDataCenter=GEU2; WacDataCenter=GEU2; ; ; ; odbn=1; KillSwitchOverrides_enableKillSwitches=; KillSwitchOverrides_disableKillSwitches=; cucg=0; WSS_FullScreenMode=false' \
         --compressed --output assets.zip
         
      - run: ls ${{ github.workspace }}
        
      - name: Extract some files
        run: 7z x assets.zip
        
      - run: ls ${{ github.workspace }}
      - run: ls ${{ github.workspace }}/assets
        
      - name: Upload Artifact assets ⬆
        uses: actions/upload-artifact@v2
        with:
          name: assets
          path: assets

  run-tests:
    name: GUT Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ✔
        uses: actions/checkout@v2
      - name: GUT Testing 🧪
        uses: ceceppa/godot-gut-ci@master
        with:
          godot_version: ${{ env.GODOT_VERSION }}
          unit_test: res://test/unit # specify the path for the unit tests

  export-web:
#     if: ${{ false }}  # disable for now
    name: Web Export
    runs-on: ubuntu-latest
    needs:
      - run-tests
      - download-assets
    container:
      image: barichello/godot-ci:3.4.2
    steps:
      - name: Checkout ✔
        uses: actions/checkout@v2
        with:
          lfs: true
      - name: Download Artifact assets ⬇
        uses: actions/download-artifact@v2
        with:
          name: assets
          path: assets
          
      - name: Control assets
        run: ls
      - name: Control assets2
        run: ls assets
          
      - name: Setup ⚙
        run: |
          mkdir -v -p ~/.local/share/godot/templates
          mv /root/.local/share/godot/templates/${GODOT_VERSION}.stable ~/.local/share/godot/templates/${GODOT_VERSION}.stable
      - name: Web Build 📦
        run: |
          mkdir -v -p build/web
          godot -v --export "HTML5" build/web/index.html
      - name: Upload Artifact web ⬆
        uses: actions/upload-artifact@v2
        with:
          name: web
          path: build/web

  gh-pages:
    name: Github Pages Deploy
    runs-on: ubuntu-latest
    needs:
      - export-web
    steps:
      - name: Download Artifact web ⬇
        uses: actions/download-artifact@v2
        with:
          name: web
          path: build/web
      # Installing rsync is needed in order to deploy to GitHub Pages. Without it, the build will fail.
      - name: Install rsync 📚
        run: |
          sudo apt-get update && sudo apt-get install -y rsync
      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages # The branch the action should deploy to.
          FOLDER: build/web # The folder the action should deploy.
  
  delete-artifacts:
    name: Delete Artifacts
    runs-on: ubuntu-latest
    needs:
      - gh-pages
    steps:
      - name: Delete assets and web 🗑
        uses: GeekyEggo/delete-artifact@v1.0.0
        with:
          name: |
            web
