name: "Deploy on release"
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
    - '*' # Push events to matching *,1.0, 20.15.10
env:
  GODOT_VERSION: 3.4.2
  GAME_NAME: dragon-fly
  ITCH_USERNAME: wicling

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.4.2
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/templates
          mv /root/.local/share/godot/templates/${GODOT_VERSION}.stable ~/.local/share/godot/templates/${GODOT_VERSION}.stable
      - name: Web Build
        run: |
          mkdir -v -p build/web
          godot -v --export "HTML5" build/web/index.html
      - name: Upload Artifact web
        uses: actions/upload-artifact@v2
        with:
          name: web
          path: build/web
          
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.4.2
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/templates
          mv /root/.local/share/godot/templates/${GODOT_VERSION}.stable ~/.local/share/godot/templates/${GODOT_VERSION}.stable
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          godot -v --export "Windows Desktop" build/windows/$GAME_NAME.exe
      - name: Upload Artifact windows
        uses: actions/upload-artifact@v2
        with:
          name: windows
          path: build/windows

  add-to-release:
    name: Add files to release
    runs-on: ubuntu-latest
    needs:
      - export-web
      - export-windows
    steps:
    - uses: actions/checkout@v2
    - name: Download Artifact web
      uses: actions/download-artifact@v2
      with:
        name: web
        path: build/web
    - name: Zip Artifact web
      uses: vimtor/action-zip@v1
      with:
        files: build/web/
        dest: HTML.zip
    - name: Download Artifact windows
      uses: actions/download-artifact@v2
      with:
        name: windows
        path: build/windows
    - name: Zip Artifact windows
      uses: vimtor/action-zip@v1
      with:
        files: build/windows/
        dest: windows.zip
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ github.ref }}
        draft: false
        prerelease: true
    - name: Upload Release Asset web
      id: upload-release-asset-web 
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
        asset_path: ./HTML.zip
        asset_name: HTML.zip
        asset_content_type: application/zip
    - name: Upload Release Asset windows
      id: upload-release-asset-windows 
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
        asset_path: ./windows.zip
        asset_name: Windows.zip
        asset_content_type: application/zip


  itch-web-deploy:
    name: itch.io web deploy
    runs-on: ubuntu-latest
    needs:
      - export-web
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v2
        with:
          name: web
          path: build/web
      - name: itch.io web deploy
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: web
          ITCH_GAME: ${{ env.GAME_NAME }}
          ITCH_USER: ${{ env.ITCH_USERNAME }}
          PACKAGE: build/web
          VERSION: ${{ github.ref_name }}
          
  itch-windows-deploy:
    name: itch.io windows deploy
    runs-on: ubuntu-latest
    needs:
      - export-windows
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v2
        with:
          name: windows
          path: build/windows
      - name: itch.io windows deploy
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: windows
          ITCH_GAME: ${{ env.GAME_NAME }}
          ITCH_USER: ${{ env.ITCH_USERNAME }}
          PACKAGE: build/windows
          VERSION: ${{ github.ref_name }}
          
  delete-artifacts:
    name: Delete Artifacts
    runs-on: ubuntu-latest
    needs:
      - itch-windows-deploy
      - itch-web-deploy
      - add-to-release
    steps:
      - name: Delete web and windows
        uses: GeekyEggo/delete-artifact@v1.0.0
        with:
          name: |
            web
            windows
